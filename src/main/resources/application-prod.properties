# ===================================================================
# AMBIENTE DE PRODU\u00C7\u00C3O - DD COSM\u00C9TICOS (POSTGRESQL + ALTA PERFORMANCE)
# ===================================================================

# 1. SEGURAN\u00C7A E JWT (Ler do Ambiente da Cloud/VPS)
api.security.token.secret=${JWT_SECRET:ChaveDeEmergenciaGeradaPeloAdminProducao2026}

# 2. BANCO DE DADOS POSTGRESQL
# Altere para as credenciais da sua Cloud (AWS RDS, ElephantSQL, etc.)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ddcosmeticos_prod}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. OTIMIZA\u00C7\u00C3O DO HIKARI CP (CONNECTION POOL)
# Previne exaust\u00E3o de conex\u00F5es durante picos de vendas
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# 4. JPA E HIBERNATE (Desativar DDL em Produ\u00E7\u00E3o)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# NUNCA use update ou create em produ\u00E7\u00E3o. Use ferramentas de migra\u00E7\u00E3o (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# 5. BLOQUEIO DE SUPERF\u00CDCIE DE ATAQUE
spring.h2.console.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# 6. CONFIGURA\u00C7\u00C3O DE UPLOADS E SERVIDOR
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.port=8080
server.error.include-stacktrace=never
server.error.include-message=always

# 7. LOGS DE PRODU\u00C7\u00C3O
logging.level.br.com.lojaddcosmeticos=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/ddcosmeticos-prod.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30