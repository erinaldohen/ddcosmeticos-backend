# ==============================================================
# CONFIGURACAO GERAL (DEV / PADR\u00C3O)
# ==============================================================
spring.application.name=ddcosmeticos-backend
server.port=8080
spring.profiles.active=dev

# \uD83D\uDEE1\uFE0F Prote\u00E7\u00E3o Fiscal: For\u00E7a o Java a usar a hora de Pernambuco para a NFC-e n\u00E3o ser rejeitada
spring.jackson.time-zone=America/Recife
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss

# ==============================================================
# BANCO DE DADOS (PostgreSQL)
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# JPA / HIBERNATE (Performance & Compatibilidade)
# ==============================================================
# Logs SQL (\u00DAtil em Dev, desligar em Prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Otimiza\u00E7\u00E3o de Batch (Insere/Atualiza em lotes para performance)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Evita que a conex\u00E3o com o banco fique aberta durante a renderiza\u00E7\u00E3o (Performance)
spring.jpa.open-in-view=false

# ==============================================================
# UPLOAD DE ARQUIVOS
# ==============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================================================
# SEGURAN\u00C7A & CRIPTOGRAFIA
# ==============================================================
# Chave para assinar o JWT
api.security.token.secret=${JWT_SECRET}

# Configura\u00E7\u00E3o de Seguran\u00E7a do Banco (MANTENHA ESTE ARQUIVO FORA DO GITHUB)
app.security.db-secret-key=${APP_SECURITY_DB_SECRET_KEY}

# ==============================================================
# INTEGRA\u00C7\u00D5ES EXTERNAS (Cosmos)
# ==============================================================
cosmos.api.url=https://api.cosmos.bluesoft.com.br/gtins
cosmos.api.token=${COSMOS_TOKEN}

# ==============================================================
# EMAIL (JavaMailSender / Gmail Moderno)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lojaddcosmeticos@gmail.com
spring.mail.password=${SENHA_EMAIL}

# Configura\u00E7\u00F5es de Seguran\u00E7a do Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true

# ==============================================================
# CONTROLE DE VERS\u00C3O DE BANCO DE DADOS (FLYWAY)
# ==============================================================
# MUDAN\u00C7A CR\u00CDTICA: Como o Flyway est\u00E1 ativo, o Hibernate APENAS valida.
# Evita que o Hibernate tente modificar tabelas ao mesmo tempo que o Flyway.
spring.jpa.hibernate.ddl-auto=validate

# Ativar Flyway
spring.flyway.enabled=true
# Diz ao Flyway que o banco j\u00E1 existe com tabelas.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1